services:
  # Traefik Reverse Proxy & Auto SSL
  traefik:
    image: traefik:v2.10
    container_name: traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=admin@nasgorcok.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"

  # Nasgorcok Web App
  app:
    build: .
    container_name: nasgorcok
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nasgor.rule=Host(`nasgorcok.com`) || Host(`www.nasgorcok.com`)"
      - "traefik.http.routers.nasgor.entrypoints=websecure"
      - "traefik.http.routers.nasgor.tls.certresolver=myresolver"
      - "traefik.http.services.nasgor.loadbalancer.server.port=3000"